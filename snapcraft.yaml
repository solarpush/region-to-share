name: region-to-share
base: core24
version: '2.0.0-beta1'
summary: Share selected screen regions in video calls
description: |
  Region-to-Share allows you to select a specific area of your screen
  and display it in a window that you can share directly 
  in your video conferencing applications (Google Meet, Teams, Discord, etc.).

  Version 2.0 beta channel Complete Rust rewrite wih improved performance.
  
  What's new:
  - Native Rust implementation (no Python dependencies)
  - Lower CPU usage
  - Native Wayland support via XDG Desktop Portal
  - Native X11 support
  - Modern egui interface
  - Smaller binary size

  Features:
  - Interactive region selection
  - High-performance real-time display
  - Works on X11 and Wayland (GNOME, KDE, Sway, Hyprland, etc.)
  - Performance monitoring overlay
  - Adjustable window opacity
  - Remember last region for quick reuse

  BETA: This is a beta version. Please report issues on GitHub.

grade: stable
confinement: strict

website: https://github.com/solarpush/region-to-share
issues: https://github.com/solarpush/region-to-share/issues
source-code: https://github.com/solarpush/region-to-share

donation:
  - https://coff.ee/solarpush

platforms:
  amd64:
    build-on: [amd64]

apps:
  region-to-share:
    command: bin/region-to-share-wrapper
    desktop: usr/share/applications/region-to-share.desktop
    plugs:
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - hardware-observe
      - screen-inhibit-control
      - home
      - network
      - unity7
      - gsettings
      # Portal/PipeWire for Wayland screen capture
      # - screencast-legacy
      # - pipewire
      # Audio interfaces often required for full PipeWire access
      # - audio-playback
      # - audio-record
    environment:
      # OpenGL - use host drivers
      LIBGL_DRIVERS_PATH: "/usr/lib/x86_64-linux-gnu/dri:$SNAP/usr/lib/x86_64-linux-gnu/dri"
      __EGL_VENDOR_LIBRARY_DIRS: "/usr/share/glvnd/egl_vendor.d:$SNAP/usr/share/glvnd/egl_vendor.d"

parts:
  region-to-share:
    plugin: rust
    source: .
    source-type: local
    rust-channel: stable
    rust-features: []
    build-packages:
      # Rust build tools
      - cargo
      - rustc
      - pkg-config
      # For bindgen (PipeWire bindings)
      - libclang-dev
      - clang
      # X11 development
      - libx11-dev
      - libxext-dev
      - libxrandr-dev
      - libxcursor-dev
      - libxfixes-dev
      - libxi-dev
      - libxinerama-dev
      # Wayland development
      - libwayland-dev
      - libxkbcommon-dev
      # PipeWire development
      - libpipewire-0.3-dev
      - libspa-0.2-dev
      # OpenGL/Vulkan development
      - libgl1-mesa-dev
      - libegl1-mesa-dev
      # D-Bus for Portal
      - libdbus-1-dev
      # Misc
      - libfontconfig1-dev
      - libfreetype6-dev
    stage-packages:
      # X11 runtime
      - libx11-6
      - libxext6
      - libxrandr2
      - libxcursor1
      - libxfixes3
      - libxi6
      - libxinerama1
      - libxcb1
      - libxcb-render0
      - libxcb-shape0
      - libxcb-xfixes0
      - libxcb-shm0
      - libxcb-xkb1
      - libxcb-icccm4
      - libxcb-image0
      - libxcb-keysyms1
      - libxcb-randr0
      - libxcb-render-util0
      # Wayland runtime
      - libwayland-client0
      - libwayland-cursor0
      - libwayland-egl1
      - libxkbcommon0
      - libxkbcommon-x11-0
      - xkb-data
      # PipeWire runtime (client only, daemon on host)
      - libpipewire-0.3-0
      - libspa-0.2-modules
      - pipewire  # Contains client.conf and other config files
      # OpenGL/Mesa/EGL for DmaBuf import
      - libgl1-mesa-dri
      - libegl1
      - libgles2
      - libgbm1
      - libglvnd0
      - libegl-mesa0
      # D-Bus
      - libdbus-1-3
      # Fonts
      - libfontconfig1
      - libfreetype6
      - fonts-dejavu-core
    override-build: |
      craftctl default
      
      # The rust plugin builds the workspace, find our binary
      mkdir -p $CRAFT_PART_INSTALL/bin
      
      # Copy the release binary
      if [ -f target/release/region-ui-egui ]; then
        cp target/release/region-ui-egui $CRAFT_PART_INSTALL/bin/region-to-share-bin
      else
        echo "ERROR: region-ui-egui binary not found!"
        exit 1
      fi
      
      chmod +x $CRAFT_PART_INSTALL/bin/region-to-share-bin
      
      # Create wrapper script that sets up display environment
      cat > $CRAFT_PART_INSTALL/bin/region-to-share-wrapper << 'WRAPPER_EOF'
      #!/bin/bash
      
      # Display detection - works on all distros (Ubuntu, Arch, Manjaro, Mint, Fedora)
      # These variables are set by the desktop session and passed through snap plugs
      
      # CRITICAL: Fix XDG_RUNTIME_DIR for Wayland socket access
      # Snap sets XDG_RUNTIME_DIR to /run/user/<uid>/snap.<name> but the Wayland
      # socket is at /run/user/<uid>/wayland-0. We need to use the real runtime dir.
      REAL_XDG_RUNTIME_DIR="/run/user/$(id -u)"
      
      # Wayland detection (KDE, GNOME Wayland, Sway, Hyprland, etc.)
      if [ -n "$WAYLAND_DISPLAY" ]; then
        export WAYLAND_DISPLAY="$WAYLAND_DISPLAY"
        export XDG_SESSION_TYPE="${XDG_SESSION_TYPE:-wayland}"
        # Use real runtime dir for Wayland socket
        export XDG_RUNTIME_DIR="$REAL_XDG_RUNTIME_DIR"
      fi
      
      # X11 / XWayland detection
      if [ -n "$DISPLAY" ]; then
        export DISPLAY="$DISPLAY"
        if [ -z "$XDG_SESSION_TYPE" ]; then
          export XDG_SESSION_TYPE="x11"
        fi
      fi
      
      # Fallback: try to detect from XDG_SESSION_TYPE if display vars are missing
      if [ -z "$DISPLAY" ] && [ -z "$WAYLAND_DISPLAY" ]; then
        # Try common defaults
        if [ "$XDG_SESSION_TYPE" = "wayland" ]; then
          export WAYLAND_DISPLAY="${WAYLAND_DISPLAY:-wayland-0}"
          export DISPLAY="${DISPLAY:-:0}"
          export XDG_RUNTIME_DIR="$REAL_XDG_RUNTIME_DIR"
        else
          export DISPLAY="${DISPLAY:-:0}"
        fi
      fi
      
      # XDG runtime dir fallback (for X11 or if not set above)
      export XDG_RUNTIME_DIR="${XDG_RUNTIME_DIR:-$REAL_XDG_RUNTIME_DIR}"
      
      # XKB keyboard configuration - use snap's data or fallback to host
      if [ -d "$SNAP/usr/share/X11/xkb" ]; then
        export XKB_CONFIG_ROOT="$SNAP/usr/share/X11/xkb"
      else
        export XKB_CONFIG_ROOT="/usr/share/X11/xkb"
      fi
      
      # OpenGL - prefer host drivers for better performance
      export LIBGL_DRIVERS_PATH="/usr/lib/x86_64-linux-gnu/dri:$SNAP/usr/lib/x86_64-linux-gnu/dri"
      export __EGL_VENDOR_LIBRARY_DIRS="/usr/share/glvnd/egl_vendor.d:$SNAP/usr/share/glvnd/egl_vendor.d"
      
      # PipeWire - use snap's plugins and config, connect to host daemon
      export PIPEWIRE_RUNTIME_DIR="$REAL_XDG_RUNTIME_DIR"
      export SPA_PLUGIN_DIR="$SNAP/usr/lib/x86_64-linux-gnu/spa-0.2"
      export PIPEWIRE_MODULE_DIR="$SNAP/usr/lib/x86_64-linux-gnu/pipewire-0.3"
      export PIPEWIRE_CONFIG_DIR="$SNAP/usr/share/pipewire"
      
      # D-Bus for Portal communication
      export DBUS_SESSION_BUS_ADDRESS="${DBUS_SESSION_BUS_ADDRESS:-unix:path=$REAL_XDG_RUNTIME_DIR/bus}"
      
      # LD_LIBRARY_PATH for snap libraries
      export LD_LIBRARY_PATH="$SNAP/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH"
      
      # Run the actual binary
      exec "$SNAP/bin/region-to-share-bin" "$@"
      WRAPPER_EOF
      chmod +x $CRAFT_PART_INSTALL/bin/region-to-share-wrapper

  desktop-file:
    plugin: dump
    source: .
    source-type: local
    organize:
      region-to-share.desktop: usr/share/applications/region-to-share.desktop
      images/region-to-share-64.png: usr/share/icons/hicolor/64x64/apps/region-to-share.png
      images/region-to-share-128.png: usr/share/icons/hicolor/128x128/apps/region-to-share.png
      images/region-to-share-512.png: usr/share/icons/hicolor/512x512/apps/region-to-share.png
      images/region-to-share.svg: usr/share/icons/hicolor/scalable/apps/region-to-share.svg
      images/region-to-share.png: usr/share/pixmaps/region-to-share.png
    stage:
      - usr/share/applications/region-to-share.desktop
      - usr/share/icons/**
      - usr/share/pixmaps/**
